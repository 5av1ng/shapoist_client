[[Shapo]]

if_delete = false

[Shapo.style]
if_absolute = false
rotate = 0
fill = [ 0, 0, 0, 0 ]
anchor = [ "Center", "Center" ]
text_size = 12

  [Shapo.style.position]
  x = 0
  y = 0

  [Shapo.style.size]
  x = 1
  y = 1

  [Shapo.style.rotate_center]
  x = 0
  y = 0

  [Shapo.style.stroke]
  width = 3
  color = [ 255, 255, 255, 255 ]

[Shapo.style.volume.min]
x = 0
y = 0

[Shapo.style.volume.max]
x = 0
y = 0

[Shapo.shape.Circle]
radius = 1

[[Shapo.animation]]
start_value = 0.5
end_value = 2
animate_time = 100_000
if_animating = true
id = 1

[Shapo.animation.style.Size]
if_close = false

  [[Shapo.animation.style.Size.points]]
  x = 0
  y = 0

  [[Shapo.animation.style.Size.points]]
  x = 0
  y = 0

  [[Shapo.animation.style.Size.points]]
  x = 10
  y = 10

  [[Shapo.animation.style.Size.points]]
  x = 10
  y = 10

[Shapo.animation.animation.control_point_one]
x = 0.2
y = 0.8

[Shapo.animation.animation.control_point_two]
x = 0.3
y = 0.9

[[Shapo.animation]]
start_value = 2
end_value = 0
start_time = 100_000
animate_time = 1
if_animating = true
id = 1

[Shapo.animation.style.Size]
if_close = false

  [[Shapo.animation.style.Size.points]]
  x = 0
  y = 0

  [[Shapo.animation.style.Size.points]]
  x = 0
  y = 0

  [[Shapo.animation.style.Size.points]]
  x = 10
  y = 10

  [[Shapo.animation.style.Size.points]]
  x = 10
  y = 10

[Shapo.animation.animation.control_point_one]
x = 0.2
y = 0.8

[Shapo.animation.animation.control_point_two]
x = 0.3
y = 0.9
